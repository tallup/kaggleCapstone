# Laravel Forge / Nginx — WebSocket proxy for Laravel Reverb
# -----------------------------------------------------------------
# Add this inside the `server { ... }` block for HTTPS (homelogic360.net),
# BEFORE any catch-all `location /` that sends traffic to PHP.
#
# Reverb must be running (e.g. Forge daemon):
#   php artisan reverb:start
# Default listen: REVERB_SERVER_HOST=0.0.0.0  REVERB_SERVER_PORT=8080
#
# After editing: reload Nginx (Forge → site → Restart Nginx, or `sudo nginx -t && sudo systemctl reload nginx`).

location /app {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Scheme $scheme;
    proxy_set_header SERVER_PORT $server_port;
    proxy_set_header REMOTE_ADDR $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_pass http://127.0.0.1:8080;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
