# Laravel Forge / Nginx — WebSocket proxy for Laravel Reverb (WITHOUT breaking /app SPA routes)
# ============================================================================================
#
# PROBLEM THIS FIXES
# ------------------
# Laravel serves the React SPA at /app and /app/* (see routes/web.php: Route::get('/app{any?}', ...)).
# A naive `location /app { proxy_pass http://127.0.0.1:8080; }` sends *all* /app traffic to Reverb.
# Reverb is not your HTML server — browsers then get a non-HTML response and may "download"
# the page or show a broken app.
#
# Reverb only needs proxying for WebSocket handshakes (Upgrade: websocket). Normal GET/POST
# to /app must go to Laravel (try_files → index.php) like every other SPA route.
#
# PLACEMENT
# ---------
# Put this inside the `server { ... }` block for HTTPS (e.g. homelogic360.net), typically
# AFTER Forge includes, and REPLACE any old `location /app` block that only had proxy_pass.
#
# After editing: `sudo nginx -t && sudo systemctl reload nginx`
#
# Reverb daemon (Forge): php artisan reverb:start
# Default: REVERB_SERVER_HOST=0.0.0.0  REVERB_SERVER_PORT=8080

location /app {
    # Not a WebSocket upgrade → Laravel (same as location / { try_files ... })
    if ($http_upgrade !~* websocket) {
        rewrite ^ /index.php?$query_string last;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Scheme $scheme;
    proxy_set_header SERVER_PORT $server_port;
    proxy_set_header REMOTE_ADDR $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_pass http://127.0.0.1:8080;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
